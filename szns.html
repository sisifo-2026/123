                    "看到你们回来，她抬起头，露出了一个欣慰的笑容。",
                    "（阿芙泐）：看来，你们都找到了自己想要的东西。",
                    "（莉诺尔）：谢谢你，阿芙泐…谢谢你一直没有忘记我。",
                    "阿芙泐拍了拍她的背，眼睛里也泛起了泪光。",
                    "（阿芙泐）：傻瓜，我怎么会忘记你呢。",
                    "（阿芙泐）：你永远都是我最好的朋友。",
                    "阿芙泐告诉莉诺尔，阿芙罗狄忒在奥林匹斯山上一直很想念她。",
                    "宙斯也已经消气了，只要她愿意，随时都可以回到奥林匹斯山，恢复她的神职。",
                    "但莉诺尔摇了摇头。",
                    "（莉诺尔）：我不回去了。",
                    "（莉诺尔）：奥林匹斯山已经不是我的家了。我想留在人间。",
                    "（莉诺尔）：我想走遍这个世界，去看看那些我从来没有见过的风景。我想帮助那些和我一样，迷失了自我的人。",
                    "阿芙泐笑了笑。",
                    "（阿芙泐）：也好。",
                    "（阿芙泐）：按照自己的意愿去生活，才是最重要的。",
                    "第二天，你和莉诺尔在灰鸦酒馆告别。",
                    "（莉诺尔）：你真的要回家了吗？",
                    "莉诺尔问道。",
                    "（我）：嗯。我离开家已经太久了。我的家人一定很担心我。我想回去看看他们。",
                    "（莉诺尔）：那我们以后还会再见面吗？",
                    "（我）：当然会。等我处理好家里的事情，我就来找你。",
                    "（我）：到时候，我们一起去旅行，一起去看遍这个世界。",
                    "（莉诺尔）：好。",
                    "莉诺尔点了点头，我等你。",
                    "你背上背包，转身踏上了回家的路。",
                    "阳光洒在你的身上，温暖而明亮。",
                    "你回头看了一眼，莉诺尔和阿芙泐还站在酒馆门口，向你挥手告别。",
                    "你笑了笑，转过身，大步向前走去。",
                    "你不再迷茫，不再彷徨。",
                    "你知道自己是谁了。",
                    "你是枫德密·康·爱德华。",
                    "你是你自己。",
                    "你苦苦追寻了半生的答案，一直都在你的心里。",
                    "一直索求，只会离自己越来越远。",
                    "当你放下执念，回归本真的时候，你就会发现，你想要的一切，其实都在最初的起点，静静地等待着你。",
                    "风轻轻吹过，带来了远方田野的气息。",
                    "你的家，就在前方。",
                    "（全剧终）"
                ],
                next: null
            }
        };

        // 解析文本
        function parseText(text) {
            // 处理幕标题
            if (text.startsWith('《') && text.endsWith('》')) {
                return `<p class="text-center font-bold text-xl my-4">${text}</p>`;
            }
            // 处理时间地点
            if (text.startsWith('时间：') || text.startsWith('地点：')) {
                return `<p class="text-gray-600 text-sm italic">${text}</p>`;
            }
            // 处理对话
            const match = text.match(/^\(([^)]+)\)：(.*)$/);
            if (match) {
                let name = match[1];
                const content = match[2];
                if (name === '我') {
                    name = playerName;
                    return `<p><span class="font-bold text-greenPlayer">${name}</span>：${content}</p>`;
                } else {
                    return `<p><span class="font-bold">${name}</span>：${content}</p>`;
                }
            }
            // 普通文本
            return `<p class="mb-1">${text}</p>`;
        }

        // 添加文本行
        function addTextLine(text) {
            const container = document.getElementById('textContainer');
            const parsed = parseText(text);
            container.innerHTML += parsed;
            // 自动滚动到底部
            container.scrollTop = container.scrollHeight;
            window.scrollTo({
              top: document.body.scrollHeight,
              behavior: 'smooth'
            });
            
            // 处理提示
            hintCount++;
            if (hintCount > 3) {
                document.getElementById('hintText').classList.add('hidden');
            }
        }

        // 初始化剧情节点
        function initNode(nodeId) {
            currentNode = storyNodes[nodeId];
            currentTextIndex = 0;
            
            // 切换场景图片
            document.getElementById('sceneImage').src = sceneImages[currentNode.scene];
            
            // 隐藏选项，显示继续按钮
            document.getElementById('choicesContainer').classList.add('hidden');
            document.getElementById('continueBtn').classList.remove('hidden');
        }

        // 下一句文本
        function nextText() {
            if (currentTextIndex < currentNode.texts.length) {
                addTextLine(currentNode.texts[currentTextIndex]);
                currentTextIndex++;
            } else {
                // 文本走完了
                if (currentNode.choices) {
                    // 显示选项
                    showChoices(currentNode.choices);
                } else if (currentNode.next) {
                    // 下一个节点
                    initNode(currentNode.next);
                    nextText();
                } else {
                    // 结束
                    document.getElementById('continueBtn').disabled = true;
                    document.getElementById('continueBtn').innerHTML = '已结束 <i class="fa fa-check ml-1"></i>';
                }
            }
        }

        // 显示选项
        function showChoices(choices) {
            const container = document.getElementById('choicesContainer');
            container.innerHTML = '';
            choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'px-4 py-3 bg-brown text-white rounded-lg btn-hover text-left';
                btn.textContent = choice.text;
                btn.onclick = () => selectChoice(choice.next);
                container.appendChild(btn);
            });
            container.classList.remove('hidden');
            document.getElementById('continueBtn').classList.add('hidden');
        }

        // 选择选项
        function selectChoice(nextNodeId) {
            initNode(nextNodeId);
            // 选完选项后自动推进第一句剧情，无需再点继续
            nextText();
        }

        // 开始游戏
        function startGame() {
            const nameInput = document.getElementById('playerNameInput');
            playerName = nameInput.value.trim() || '旅人';
            
            // 切换页面
            document.getElementById('nameInput').classList.add('hidden');
            document.getElementById('storyPage').classList.remove('hidden');
            
            // 初始化剧情
            initNode('start');
            nextText();
        }

        // 绑定事件
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('continueBtn').addEventListener('click', nextText);
        document.getElementById('playerNameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                startGame();
            }
        });
    </script>
</body>
</html>
